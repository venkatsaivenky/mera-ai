<!DOCTYPE html>
<html>
<head>
<title>Mera AI 🍔</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 15px 20px;
  background: white;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.header h2 {
  margin: 0;
}

.user {
  cursor: pointer;
  font-weight: bold;
}

/* LAYOUT */
.main {
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 250px;
  background: #111;
  color: white;
  height: 100vh;
  padding: 15px;
}

.sidebar button {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  background: #ff5a5f;
  color: white;
  border: none;
  cursor: pointer;
}

.history-item {
  margin: 5px 0;
  cursor: pointer;
}

/* CONTENT */
.content {
  flex: 1;
  padding: 20px;
}

/* SEARCH */
.search-box {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button.search {
  padding: 12px 20px;
  background: #ff5a5f;
  color: white;
  border: none;
  border-radius: 8px;
}

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(250px,1fr));
  gap: 20px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 10px;
}

.price {
  color: green;
  font-weight: bold;
}

.old {
  text-decoration: line-through;
  color: gray;
  margin-left: 5px;
}

/* DARK MODE */
.dark body {
  background: #181818;
}

.dark .content {
  background: #181818;
  color: white;
}

.dark .card {
  background: #2a2a2a;
  color: white;
}

</style>
</head>

<body>

<div class="header">
  <h2>Mera AI 🍔</h2>
  <div class="user" onclick="logout()">👤 <span id="username"></span></div>
</div>

<div class="main">

<!-- SIDEBAR -->
<div class="sidebar">
  <button onclick="newChat()">➕ New Chat</button>
  <button onclick="toggleDark()">🌙 Dark Mode</button>
  <button onclick="clearHistory()">🗑 Clear History</button>

  <h4>History</h4>
  <div id="history"></div>
</div>

<!-- CONTENT -->
<div class="content">

<div class="search-box">
  <input id="query" placeholder="Search food..." onkeydown="if(event.key==='Enter') search()" />
  <button class="search" onclick="search()">Search</button>
</div>

<div id="chat"></div>

</div>

</div>

<script>

/* LOGIN */
if(!localStorage.getItem("user")){
  let name = prompt("Enter your name");
  localStorage.setItem("user", name);
}
document.getElementById("username").innerText = localStorage.getItem("user");

/* SEARCH FUNCTION */
async function search(){

 let query = document.getElementById("query").value;
 let user = localStorage.getItem("user");

 saveHistory(query);

 let res = await fetch(
  `https://mera-ai.onrender.com/search?query=${query}&user=${user}`
 );

 let data = await res.json();

 let cards = "";

 data.results.forEach((r,i)=>{

  let img = "https://source.unsplash.com/400x300/?" + query + ",food";

  cards += `
  <div class="card">
    <img src="${img}" onerror="this.src='https://via.placeholder.com/400x300'">
    <h4>${r.restaurant}</h4>

    <p>
      <span class="price">₹${r.final_price}</span>
      <span class="old">₹${r.original_price}</span>
    </p>

    <p>${r.discount}% OFF | ${r.delivery_time} mins</p>
    <p>${r.platform}</p>

    ${i===0 ? "<b>⭐ Best for you</b>" : ""}
  </div>
  `;
 });

 document.getElementById("chat").innerHTML += `
  <div><b>You:</b> ${query}</div>

  <div style="margin:10px 0;padding:10px;background:#10a37f;color:white;border-radius:8px;">
    🤖 ${data.ai_message}
  </div>

  <div class="cards">${cards}</div>
 `;
}

/* HISTORY */
function saveHistory(q){
 let h = JSON.parse(localStorage.getItem("history")||"[]");
 h.unshift(q);
 localStorage.setItem("history", JSON.stringify(h));
 loadHistory();
}

function loadHistory(){
 let h = JSON.parse(localStorage.getItem("history")||"[]");
 let html="";
 h.forEach(i=>{
   html+=`<div class="history-item" onclick="fill('${i}')">${i}</div>`;
 });
 document.getElementById("history").innerHTML = html;
}

function fill(q){
 document.getElementById("query").value=q;
 search();
}

function clearHistory(){
 localStorage.removeItem("history");
 loadHistory();
}

/* NEW CHAT */
function newChat(){
 document.getElementById("chat").innerHTML="";
}

/* DARK MODE */
function toggleDark(){
 document.body.classList.toggle("dark");
}

/* LOGOUT */
function logout(){
 localStorage.removeItem("user");
 location.reload();
}

loadHistory();

</script>

</body>
</html>
