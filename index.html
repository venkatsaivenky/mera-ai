<!DOCTYPE html>
<html>
<head>
<title>Mera AI 🍔</title>

<style>
body { margin:0; font-family:Arial; background:#111; color:white; }
.header { display:flex; justify-content:space-between; padding:15px; background:#1e1e1e; }
.main { display:flex; }
.sidebar { width:220px; background:#000; padding:15px; }
.sidebar button { width:100%; margin-bottom:10px; padding:10px; background:#ff5a5f; color:white; border:none; }
.content { flex:1; padding:20px; }
.search-box { display:flex; gap:10px; }
input { flex:1; padding:12px; border-radius:8px; border:none; }
button.search { padding:12px 20px; background:#ff5a5f; border:none; color:white; border-radius:8px; }

.cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:20px; margin-top:20px; }
.card { background:#1e1e1e; padding:10px; border-radius:10px; }
.card img { width:100%; height:150px; object-fit:cover; border-radius:10px; }

.price { color:#00e676; }
.old { text-decoration:line-through; color:gray; }

.ai-box { margin-top:10px; padding:10px; background:#10a37f; border-radius:8px; }
</style>
</head>

<body>

<div class="header">
  <h2>Mera AI 🍔</h2>
  <div>👤 <span id="username"></span></div>
</div>

<div class="main">

<div class="sidebar">
  <button onclick="newChat()">➕ New Chat</button>
  <button onclick="clearHistory()">🗑 Clear History</button>
  <h4>History</h4>
  <div id="history"></div>
</div>

<div class="content">

<div class="search-box">
  <input id="query" placeholder="Search food..."
    onkeydown="if(event.key==='Enter') search()"/>
  <button class="search" onclick="search()">Search</button>
</div>

<div id="chat"></div>

</div>
</div>

<script>

if(!localStorage.getItem("user")){
  let name = prompt("Enter your name");
  localStorage.setItem("user", name);
}
document.getElementById("username").innerText = localStorage.getItem("user");

function getFoodImage(query, index){
  return `https://picsum.photos/400/300?random=${query}${index}`;
}

async function search(){

 let query = document.getElementById("query").value;
 saveHistory(query);

 document.getElementById("chat").innerHTML="";

 let res = await fetch(`https://mera-ai.onrender.com/search?query=${query}`);
 let data = await res.json();

 let cards="";

 data.results.forEach((r,i)=>{

  let img = getFoodImage(query,i);

  cards += `
  <div class="card">
    <img src="${img}">
    <h3>${r.restaurant}</h3>
    <p><span class="price">₹${r.final_price}</span> <span class="old">₹${r.original_price}</span></p>
    <p>${r.discount}% OFF | ${r.delivery_time} mins</p>
    <p>${r.platform}</p>
  </div>`;
 });

 document.getElementById("chat").innerHTML = `
  <div><b>You:</b> ${query}</div>
  <div class="ai-box">🤖 ${data.ai_message}</div>
  <div class="cards">${cards}</div>`;
}

function saveHistory(q){
 let h=JSON.parse(localStorage.getItem("history")||"[]");
 h.unshift(q);
 localStorage.setItem("history",JSON.stringify(h));
 loadHistory();
}

function loadHistory(){
 let h=JSON.parse(localStorage.getItem("history")||"[]");
 let html="";
 h.forEach(i=>{ html+=`<div onclick="fill('${i}')">${i}</div>`; });
 document.getElementById("history").innerHTML=html;
}

function fill(q){
 document.getElementById("query").value=q;
 search();
}

function clearHistory(){
 localStorage.removeItem("history");
 loadHistory();
}

function newChat(){
 document.getElementById("chat").innerHTML="";
}

loadHistory();

</script>

</body>
</html>
