<!DOCTYPE html>
<html>
<head>
<title>Mera AI 🍔</title>

<style>
body { margin:0; font-family:Arial; background:#111; color:white; }

.header {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#1e1e1e;
}

.main { display:flex; }

.sidebar {
  width:220px;
  background:#000;
  padding:15px;
}

.sidebar button {
  width:100%;
  margin-bottom:10px;
  padding:10px;
  background:#ff5a5f;
  color:white;
  border:none;
  border-radius:6px;
}

.content { flex:1; padding:20px; }

.search-box {
  display:flex;
  gap:10px;
}

input {
  flex:1;
  padding:12px;
  border-radius:8px;
  border:none;
}

button.search {
  padding:12px;
  background:#ff5a5f;
  color:white;
  border:none;
  border-radius:8px;
}

.suggestions {
  margin-top:10px;
}

.suggestions span {
  background:#333;
  padding:5px 10px;
  margin-right:5px;
  border-radius:5px;
  cursor:pointer;
}

.cards {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
  margin-top:20px;
}

.card {
  background:#1e1e1e;
  padding:10px;
  border-radius:10px;
}

.card img {
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:10px;
}

.ai-box {
  margin-top:10px;
  padding:10px;
  background:#10a37f;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="header">
  <h2>Mera AI 🍔</h2>
  <div>👤 venky</div>
</div>

<div class="main">

<div class="sidebar">
  <button onclick="newChat()">➕ New Chat</button>
  <button onclick="clearHistory()">🗑 Clear History</button>
  <div id="history"></div>
</div>

<div class="content">

<div class="search-box">
  <input id="query" placeholder="Search food..."
    onkeydown="if(event.key==='Enter') search()"/>
  <button class="search" onclick="search()">Search</button>
</div>

<div id="suggestions" class="suggestions"></div>
<div id="chat"></div>

</div>
</div>

<script>

function newChat(){ document.getElementById("chat").innerHTML=""; }

function clearHistory(){
  localStorage.removeItem("history");
  loadHistory();
}

function saveHistory(q){
  let h = JSON.parse(localStorage.getItem("history")||"[]");
  h.unshift(q);
  localStorage.setItem("history",JSON.stringify(h));
  loadHistory();
}

function loadHistory(){
  let h = JSON.parse(localStorage.getItem("history")||"[]");
  document.getElementById("history").innerHTML =
    h.map(x=>`<div onclick="repeat('${x}')">${x}</div>`).join("");
}

function repeat(q){
  document.getElementById("query").value=q;
  search();
}

async function search(){

 let query = document.getElementById("query").value;
 if(!query) return;

 saveHistory(query);

 document.getElementById("chat").innerHTML = "<p>⏳ Loading...</p>";

 try {

  let res = await fetch(`https://mera-ai.onrender.com/search?query=${query}`);
  let data = await res.json();

  // suggestions
  document.getElementById("suggestions").innerHTML =
    data.suggestions.map(s=>`<span onclick="repeat('${s}')">${s}</span>`).join("");

  let cards="";

  data.results.forEach((r,i)=>{
    cards += `
    <div class="card">
      <img src="${r.image}"
       loading="lazy"
       referrerpolicy="no-referrer"
       onerror="this.src='https://via.placeholder.com/400x300?text=Food'">

      <h3>${r.restaurant}</h3>
      <p>₹${r.final_price} <span style="text-decoration:line-through;color:gray;">₹${r.original_price}</span></p>
      <p>${r.discount}% OFF | ${r.delivery_time} mins</p>
      <p>${r.platform}</p>
      ${i===0 ? "<b>🔥 Best Choice</b>" : ""}
    </div>`;
  });

  document.getElementById("chat").innerHTML = `
    <div class="ai-box">🤖 ${data.ai_message}</div>
    <div class="cards">${cards}</div>`;

 } catch {
  document.getElementById("chat").innerHTML =
    "<p>⚠️ Backend issue. Try again.</p>";
 }

}

loadHistory();

</script>

</body>
</html>
