<!DOCTYPE html>
<html>
<head>
<title>Mera AI 🍔</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
  transition:0.3s;
}

.light {
  background:#f5f5f5;
  color:black;
}

.header {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#1e1e1e;
}

.light .header { background:#ddd; }

.main { display:flex; }

.sidebar {
  width:220px;
  background:#000;
  padding:15px;
}

.light .sidebar { background:#eee; }

.sidebar button {
  width:100%;
  margin-bottom:10px;
  padding:10px;
  background:#ff5a5f;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.history-item {
  cursor:pointer;
  padding:5px;
}

.content { flex:1; padding:20px; }

.search-box {
  display:flex;
  gap:10px;
}

input {
  flex:1;
  padding:12px;
  border-radius:8px;
  border:none;
}

.cards {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
  margin-top:20px;
}

.card {
  background:#1e1e1e;
  padding:10px;
  border-radius:10px;
}

.light .card { background:#fff; }

.card img {
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:10px;
}

.ai-box {
  margin-top:10px;
  padding:10px;
  background:#10a37f;
  border-radius:8px;
}

</style>
</head>

<body>

<div class="header">
  <h2>Mera AI 🍔</h2>
  <div>👤 venky</div>
</div>

<div class="main">

<!-- 🔴 SIDEBAR -->
<div class="sidebar">

  <button onclick="newChat()">➕ New Chat</button>
  <button onclick="toggleMode()">🌙 Toggle Mode</button>
  <button onclick="clearHistory()">🗑 Clear History</button>

  <h4>History</h4>
  <div id="history"></div>

</div>

<!-- 🟢 CONTENT -->
<div class="content">

<div class="search-box">
  <input id="query" placeholder="Search food..."
    onkeydown="if(event.key==='Enter') search()"/>
  <button onclick="search()">Search</button>
</div>

<div id="chat"></div>

</div>
</div>

<script>

let dark = true;

// 🌙 DARK MODE
function toggleMode(){
  dark = !dark;
  document.body.classList.toggle("light");
}

// 🆕 NEW CHAT
function newChat(){
  document.getElementById("chat").innerHTML="";
}

// 💾 SAVE HISTORY
function saveHistory(q){
  let h = JSON.parse(localStorage.getItem("history")||"[]");
  h.unshift(q);
  localStorage.setItem("history", JSON.stringify(h));
  loadHistory();
}

// 📜 LOAD HISTORY
function loadHistory(){
  let h = JSON.parse(localStorage.getItem("history")||"[]");

  document.getElementById("history").innerHTML =
    h.map(x=>`<div class="history-item" onclick="repeat('${x}')">${x}</div>`).join("");
}

// 🔁 REPEAT SEARCH
function repeat(q){
  document.getElementById("query").value = q;
  search();
}

// 🗑 CLEAR HISTORY
function clearHistory(){
  localStorage.removeItem("history");
  loadHistory();
}

// 🔍 SEARCH
async function search(){

 let query = document.getElementById("query").value.trim();
 if(!query) return;

 saveHistory(query);

 let chat = document.getElementById("chat");

 chat.innerHTML = "⏳ Loading...";

 try {

  let res = await fetch("https://mera-ai.onrender.com/search?query=" + encodeURIComponent(query));
  let data = await res.json();

  let cards = "";

  data.results.forEach((r,i)=>{

    cards += `
    <div class="card">
      <img src="${r.image}"
        loading="lazy"
        onerror="this.src='https://via.placeholder.com/400x300?text=Food'">

      <h3>${r.restaurant}</h3>

      <p>₹${r.final_price} 
        <span style="text-decoration:line-through;color:gray;">
          ₹${r.original_price}
        </span>
      </p>

      <p>${r.discount}% OFF | ${r.delivery_time} mins</p>
      <p>${r.platform}</p>

      ${i===0 ? "<b>🔥 Best Choice</b>" : ""}
    </div>
    `;
  });

  chat.innerHTML = `
    <div class="ai-box">🤖 ${data.ai_message}</div>
    <div class="cards">${cards}</div>
  `;

 } catch {
  chat.innerHTML = "⚠️ Backend issue. Try again.";
 }

}

// 🔁 LOAD HISTORY ON START
loadHistory();

</script>

</body>
</html>
