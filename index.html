<!DOCTYPE html>
<html>
<head>
<title>Mera AI 🍔</title>

<style>
body { margin:0; font-family:Arial; background:#111; color:white; }

.header {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#1e1e1e;
}

.main { display:flex; }

.sidebar {
  width:220px;
  background:#000;
  padding:15px;
}

.sidebar button {
  width:100%;
  margin-bottom:10px;
  padding:10px;
  background:#ff5a5f;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.content { flex:1; padding:20px; }

.search-box {
  display:flex;
  gap:10px;
}

input {
  flex:1;
  padding:12px;
  border-radius:8px;
  border:none;
  font-size:16px;
}

button.search {
  padding:12px 20px;
  background:#ff5a5f;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

.cards {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
  margin-top:20px;
}

.card {
  background:#1e1e1e;
  padding:10px;
  border-radius:10px;
}

.card img {
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:10px;
}

.ai-box {
  margin-top:10px;
  padding:10px;
  background:#10a37f;
  border-radius:8px;
}

.error {
  background:#ff4d4d;
  padding:10px;
  border-radius:6px;
  margin-top:10px;
}

.loader {
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
  <h2>Mera AI 🍔</h2>
  <div>👤 venky</div>
</div>

<div class="main">

<div class="sidebar">
  <button onclick="newChat()">➕ New Chat</button>
</div>

<div class="content">

<div class="search-box">
  <input id="query" placeholder="Search food..."
    onkeydown="if(event.key==='Enter') search()"/>
  <button class="search" onclick="search()">Search</button>
</div>

<div id="chat"></div>

</div>
</div>

<script>

function newChat(){
  document.getElementById("chat").innerHTML = "";
}

async function search(){

 let query = document.getElementById("query").value.trim();
 if(!query) return;

 let chat = document.getElementById("chat");

 // loading state
 chat.innerHTML = "<div class='loader'>⏳ Loading...</div>";

 try {

  let res = await fetch("https://mera-ai.onrender.com/search?query=" + encodeURIComponent(query));

  if (!res.ok) throw new Error("API failed");

  let data = await res.json();

  if (!data.results) throw new Error("Invalid response");

  let cards = "";

  data.results.forEach((r,i)=>{

    cards += `
    <div class="card">
      <img src="${r.image}"
           loading="lazy"
           referrerpolicy="no-referrer"
           onerror="this.src='https://via.placeholder.com/400x300?text=Food'">

      <h3>${r.restaurant}</h3>

      <p>
        ₹${r.final_price}
        <span style="text-decoration:line-through;color:gray;">
          ₹${r.original_price}
        </span>
      </p>

      <p>${r.discount}% OFF | ${r.delivery_time} mins</p>
      <p>${r.platform}</p>

      ${i===0 ? "<b>🔥 Best Choice</b>" : ""}
    </div>
    `;
  });

  chat.innerHTML = `
    <div class="ai-box">🤖 ${data.ai_message || "Here are your results"}</div>
    <div class="cards">${cards}</div>
  `;

 } catch (e) {

  console.error(e);

  chat.innerHTML = `
    <div class="error">
      ⚠️ Backend not responding.<br>
      Please wait 30 seconds and try again.
    </div>
  `;
 }

}

</script>

</body>
</html>
