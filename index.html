<!DOCTYPE html>
<html>
<head>
<title>Mera AI</title>

<style>
body {margin:0; font-family:Arial; background:#111; color:white;}
.light {background:#f5f5f5; color:black;}

.header {padding:15px; background:#1e1e1e; display:flex; justify-content:space-between;}
.main {display:flex;}
.sidebar {width:260px; background:#000; padding:15px;}
.light .sidebar {background:#eee;}

button {width:100%; margin-bottom:10px; padding:10px; border:none; border-radius:6px; background:#ff5a5f; color:white;}
input {padding:10px; width:70%; border-radius:6px;}

.content {flex:1; padding:20px;}
.card {background:#1e1e1e; padding:10px; margin:10px; border-radius:10px;}
.light .card {background:#fff;}

.card img {width:100%; height:150px; object-fit:cover;}
</style>
</head>

<body>

<div class="header">
  <h2>Mera AI 🍔</h2>
  <div id="user"></div>
</div>

<div class="main">

<div class="sidebar">
  <button onclick="newThread()">+ New Chat</button>
  <button onclick="toggleMode()">🌙 Toggle Mode</button>
  <button onclick="clearHistory()">🗑 Clear History</button>

  <h4>Threads</h4>
  <div id="threads"></div>

  <h4>History</h4>
  <div id="history"></div>
</div>

<div class="content">

<div id="loginBox">
  <input id="u" placeholder="username">
  <input id="p" type="password" placeholder="password">
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
  <input id="query" placeholder="Search..." onkeydown="if(event.key==='Enter')search()">
  <button onclick="search()">Search</button>

  <div id="chat"></div>
</div>

</div>
</div>

<script>

let user="";
let thread="chat1";
let dark=true;

// LOGIN
async function login(){
 let u=document.getElementById("u").value;
 let p=document.getElementById("p").value;

 let res=await fetch(`https://mera-ai.onrender.com/login?username=${u}&password=${p}`,{method:"POST"});

 if(res.ok){
   user=u;
   document.getElementById("loginBox").style.display="none";
   document.getElementById("app").style.display="block";
   document.getElementById("user").innerHTML="👤 "+u;
   loadThreads();
 }
}

// SEARCH
async function search(){
 let q=document.getElementById("query").value;

 let res=await fetch(`https://mera-ai.onrender.com/search?query=${q}&user=${user}&thread=${thread}`);
 let data=await res.json();

 let html=`<div>${data.ai_message}</div>`;

 data.results.forEach(r=>{
  html+=`
  <div class="card">
   <img src="${r.image}" onerror="this.src='https://via.placeholder.com/400x300'">
   <h3>${r.restaurant}</h3>
   ₹${r.final_price}
  </div>`;
 });

 document.getElementById("chat").innerHTML=html;

 loadHistory();
 loadThreads();
}

// THREADS
function newThread(){
 thread="chat"+Date.now();
 document.getElementById("chat").innerHTML="";
}

async function loadThreads(){
 let res=await fetch(`https://mera-ai.onrender.com/threads?user=${user}`);
 let data=await res.json();

 document.getElementById("threads").innerHTML=
 data.map(t=>`<div onclick="switchThread('${t}')">${t}</div>`).join("");
}

function switchThread(t){
 thread=t;
 loadHistory();
}

// HISTORY
async function loadHistory(){
 let res=await fetch(`https://mera-ai.onrender.com/history?user=${user}&thread=${thread}`);
 let data=await res.json();

 document.getElementById("history").innerHTML=
 data.map(x=>`<div onclick="repeat('${x}')">${x}</div>`).join("");
}

function repeat(q){
 document.getElementById("query").value=q;
 search();
}

// CLEAR
async function clearHistory(){
 await fetch(`https://mera-ai.onrender.com/clear?user=${user}`,{method:"DELETE"});
 loadHistory();
 loadThreads();
}

// DARK MODE
function toggleMode(){
 dark=!dark;
 document.body.classList.toggle("light");
}

</script>

</body>
</html>
