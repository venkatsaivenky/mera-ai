<!DOCTYPE html>
<html>
<head>
<title>Mera AI 🍔</title>

<style>
body { margin:0; font-family:Arial; background:#111; color:white; }
.header { display:flex; justify-content:space-between; padding:15px; background:#1e1e1e; }
.main { display:flex; }
.sidebar { width:220px; background:#000; padding:15px; }
.sidebar button { width:100%; margin-bottom:10px; padding:10px; background:#ff5a5f; color:white; border:none; }
.content { flex:1; padding:20px; }

.search-box { display:flex; gap:10px; }

input { flex:1; padding:12px; border-radius:8px; border:none; }

button.search {
  padding:12px 20px;
  background:#ff5a5f;
  border:none;
  color:white;
  border-radius:8px;
}

.cards {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
  margin-top:20px;
}

.card {
  background:#1e1e1e;
  padding:10px;
  border-radius:10px;
}

.card img {
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:10px;
}

.price { color:#00e676; }
.old { text-decoration:line-through; color:gray; }

.ai-box {
  margin-top:10px;
  padding:10px;
  background:#10a37f;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="header">
  <h2>Mera AI 🍔</h2>
</div>

<div class="main">

<div class="sidebar">
  <button onclick="search()">🔍 Search</button>
</div>

<div class="content">

<div class="search-box">
  <input id="query" placeholder="Search food..."
    onkeydown="if(event.key==='Enter') search()"/>
  <button class="search" onclick="search()">Search</button>
</div>

<div id="chat"></div>

</div>
</div>

<script>

async function search(){

 let query = document.getElementById("query").value;

 if(!query) return;

 let res = await fetch(`https://mera-ai.onrender.com/search?query=${query}`);
 let data = await res.json();

 let cards="";

 data.results.forEach((r,i)=>{

  cards += `
  <div class="card">
    <img src="${r.image}"
         onerror="this.src='https://via.placeholder.com/400x300?text=Food'">

    <h3>${r.restaurant}</h3>

    <p>
      <span class="price">₹${r.final_price}</span>
      <span class="old">₹${r.original_price}</span>
    </p>

    <p>${r.discount}% OFF | ${r.delivery_time} mins</p>
    <p>${r.platform}</p>

    ${i===0 ? "<b>🔥 Best Choice</b>" : ""}
  </div>`;
 });

 document.getElementById("chat").innerHTML = `
  <div><b>You:</b> ${query}</div>
  <div class="ai-box">🤖 ${data.ai_message}</div>
  <div class="cards">${cards}</div>`;
}

</script>

</body>
</html>
