<!DOCTYPE html>
<html>
<head>
<title>Mera AI</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
}

/* DARK MODE */
.dark {
    background: #121212;
    color: white;
}

/* LOGIN SCREEN */
#loginPage {
    display: flex;
    height: 100vh;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: white;
    padding: 30px;
    border-radius: 10px;
    text-align: center;
}

.dark .login-box {
    background: #1e1e1e;
}

/* APP LAYOUT */
#app {
    display: none;
}

.container {
    display: flex;
    height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    background: #202123;
    color: white;
    padding: 20px;
}

.sidebar h2 {
    margin-bottom: 20px;
}

/* MAIN */
.main {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

/* INPUT */
.search-box {
    display: flex;
    margin-bottom: 20px;
}

.search-box input {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.search-box button {
    margin-left: 10px;
    padding: 12px;
    border: none;
    background: #ff5a5f;
    color: white;
    border-radius: 8px;
}

/* CARDS */
.results {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
}

.card {
    background: white;
    border-radius: 10px;
    overflow: hidden;
}

.dark .card {
    background: #1e1e1e;
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

.card-content {
    padding: 10px;
}

.price {
    color: green;
    font-weight: bold;
}

.old-price {
    text-decoration: line-through;
    color: gray;
}

.badge {
    background: green;
    color: white;
    padding: 4px;
    border-radius: 4px;
    font-size: 12px;
}
</style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage">
    <div class="login-box">
        <h2>Mera AI Login</h2>
        <input id="username" placeholder="Enter name" /><br><br>
        <button onclick="login()">Enter</button>
    </div>
</div>

<!-- APP -->
<div id="app">
    <div class="container">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <h2>Mera AI 🍔</h2>
            <button onclick="toggleDark()">🌙 Toggle Mode</button>
        </div>

        <!-- MAIN -->
        <div class="main">

            <div class="search-box">
                <input id="query" placeholder="Search food..." />
                <button onclick="search()">Search</button>
            </div>

            <div id="results" class="results"></div>

        </div>
    </div>
</div>

<script>

/* LOGIN */
function login() {
    let name = document.getElementById("username").value;
    if (!name) return;

    document.getElementById("loginPage").style.display = "none";
    document.getElementById("app").style.display = "block";
}

/* DARK MODE */
function toggleDark() {
    document.body.classList.toggle("dark");
}

/* SEARCH */
async function search() {
    let query = document.getElementById("query").value;

    if (!query) return;

    let res = await fetch("https://mera-ai.onrender.com/search?query=" + query);
    let data = await res.json();

    let html = "";

    /* FALLBACK if empty */
    if (!data.results || data.results.length === 0) {
        html = "<p>No results found. Showing random deals...</p>";
    }

    data.results.forEach((r, index) => {

        let img = "https://loremflickr.com/400/300/" + query;

        html += `
        <div class="card">
            <img src="${img}" onerror="this.src='https://via.placeholder.com/400x300?text=Food'">
            <div class="card-content">
                <h3>${r.restaurant}</h3>

                <p>
                    <span class="price">₹${r.final_price}</span>
                    <span class="old-price">₹${r.original_price}</span>
                </p>

                <div class="badge">${r.discount}% OFF</div>
                <p>${r.delivery_time} mins</p>
                <p>${r.platform}</p>

                ${index === 0 ? '<div class="badge" style="background:orange;">Best Deal ⭐</div>' : ''}
            </div>
        </div>
        `;
    });

    document.getElementById("results").innerHTML = html;
}

/* ENTER KEY */
document.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        search();
    }
});
</script>

</body>
</html>
