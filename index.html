<!DOCTYPE html>
<html>
<head>
<title>Mera AI</title>

<style>
body {
    font-family: 'Segoe UI';
    background: #f8f9fa;
    text-align: center;
}

input {
    width: 50%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    padding: 12px 20px;
    background: #ff5a5f;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    background: white;
    width: 260px;
    margin: 15px;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    text-align: left;
}

.price {
    color: green;
    font-size: 18px;
    font-weight: bold;
}

.old-price {
    text-decoration: line-through;
    color: gray;
}

.badge {
    background: #28a745;
    color: white;
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 12px;
}
</style>
</head>

<body>

<h2>Mera AI 🍔</h2>

<input id="query" placeholder="Search food..." />
<button onclick="search()">Search</button>

<div id="results" class="container"></div>

<script>
async function search() {
    let query = document.getElementById("query").value;

    let res = await fetch("https://mera-ai.onrender.com/search?query=" + encodeURIComponent(query));
    let data = await res.json();

    let html = "";

    data.results.forEach(r => {
        html += `
        <div class="card">
            <h3>${r.restaurant}</h3>
            <p>
                <span class="price">₹${r.final_price}</span>
                <span class="old-price">₹${r.original_price}</span>
            </p>
            <p class="badge">${r.discount}% OFF</p>
            <p>⏱ ${r.delivery_time} mins</p>
            <p>${r.platform}</p>
        </div>
        `;
    });

    document.getElementById("results").innerHTML = html;
}
</script>

</body>
</html>
