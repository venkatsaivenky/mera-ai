<!DOCTYPE html>
<html>
<head>
<title>Mera AI</title>

<style>
body { margin:0; font-family:Segoe UI; }
.dark { background:#121212; color:white; }

.header {
 display:flex; justify-content:space-between;
 padding:15px; background:white;
}
.dark .header { background:#1e1e1e; }

#loginPage {
 display:flex; height:100vh;
 justify-content:center; align-items:center;
}

.login-box { background:white; padding:30px; border-radius:10px; }
.dark .login-box { background:#1e1e1e; }

#app { display:none; }

.container { display:flex; }
.sidebar {
 width:200px; background:#202123; color:white;
 padding:20px; height:100vh;
}
.main { flex:1; padding:20px; }

.results {
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
 gap:15px;
}

.card { background:white; border-radius:10px; overflow:hidden; }
.dark .card { background:#1e1e1e; }

.card img {
 width:100%; height:150px; object-fit:cover;
}

.price { color:green; font-weight:bold; }
.old { text-decoration:line-through; color:gray; }

button {
 padding:8px; margin:5px;
 background:#ff5a5f; color:white; border:none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
 <div class="login-box">
  <h2>Mera AI Login</h2>
  <input id="username" placeholder="Enter name"><br><br>
  <button onclick="login()">Login</button>
 </div>
</div>

<!-- APP -->
<div id="app">

<div class="header">
 <div>Mera AI 🍔</div>
 <div id="userName"></div>
</div>

<div class="container">

<div class="sidebar">
 <button onclick="toggleDark()">🌙 Dark</button>
</div>

<div class="main">

<input id="query" placeholder="Search food">
<button onclick="search()">Search</button>

<div id="results" class="results"></div>

</div>
</div>
</div>

<script>

function login(){
 let name=document.getElementById("username").value;
 if(!name) return;
 localStorage.setItem("user",name);
 showApp();
}

function showApp(){
 let user=localStorage.getItem("user");
 if(!user) return;
 document.getElementById("loginPage").style.display="none";
 document.getElementById("app").style.display="block";
 document.getElementById("userName").innerText=user;
}

function toggleDark(){
 document.body.classList.toggle("dark");
}

function getImage(q){
 return "https://source.unsplash.com/400x300/?"+q+",food";
}

async function search(){
 let query=document.getElementById("query").value;
 let user=localStorage.getItem("user");

 let res=await fetch(
  "https://mera-ai.onrender.com/search?query="+query+"&user="+user
 );

 let data=await res.json();

 let html="";

 data.results.forEach((r,i)=>{

 let img=getImage(query);

 html+=`
 <div class="card">
  <img src="${img}">
  <div style="padding:10px">
   <h3>${r.restaurant}</h3>
   <p><span class="price">₹${r.final_price}</span>
   <span class="old">₹${r.original_price}</span></p>
   <p>${r.discount}% OFF | ${r.delivery_time} mins</p>
   <p>${r.platform}</p>

   <button onclick="teach('cheap')">💰 Cheap</button>
   <button onclick="teach('fast')">⚡ Fast</button>
   <button onclick="teach('discount')">🔥 Deal</button>

   ${i===0 ? "<b>⭐ Best for you</b>" : ""}
  </div>
 </div>
 `;
 });

 document.getElementById("results").innerHTML=html;
}

function teach(type){
 let user=localStorage.getItem("user");
 fetch(`https://mera-ai.onrender.com/feedback?user=${user}&type=${type}`);
}

document.addEventListener("keypress",e=>{
 if(e.key==="Enter") search();
});

showApp();

</script>

</body>
</html>
