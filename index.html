<!DOCTYPE html>
<html>
<head>
    <title>Mera AI</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            text-align: center;
            padding: 20px;
        }

        input {
            width: 60%;
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            background: #ff5a5f;
            color: white;
            border: none;
            cursor: pointer;
        }

        .card {
            background: white;
            margin: 10px auto;
            padding: 15px;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .price {
            color: green;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h2>Mera AI 🍔</h2>

<input id="query" placeholder="Enter food (dosa, biryani...)" />
<button onclick="search()">Search</button>

<div id="results"></div>

<script>
async function search() {
    let query = document.getElementById("query").value;

    let res = await fetch("https://mera-ai.onrender.com/search?query=" + encodeURIComponent(query));
    let data = await res.json();

    let html = "";

    data.results.forEach(r => {
        html += `
        <div class="card">
            <h3>${r.restaurant}</h3>
            <p class="price">₹${r.price}</p>
            <p>${r.platform}</p>
        </div>
        `;
    });

    document.getElementById("results").innerHTML = html;
}
</script>

</body>
</html>
