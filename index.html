<!DOCTYPE html>
<html>
<head>
<title>Mera AI</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f7f7f8;
}

.dark {
    background: #343541;
    color: white;
}

/* HEADER */
.header {
    padding: 15px;
    font-size: 20px;
    text-align: center;
    font-weight: bold;
}

/* CHAT AREA */
.chat-container {
    max-width: 800px;
    margin: auto;
    padding: 20px;
}

/* MESSAGE */
.message {
    margin-bottom: 20px;
}

.user-msg {
    text-align: right;
}

.ai-msg {
    text-align: left;
}

/* INPUT */
.input-box {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: white;
    padding: 15px;
    display: flex;
    justify-content: center;
}

.dark .input-box {
    background: #444654;
}

.input-box input {
    width: 60%;
    padding: 15px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
}

.input-box button {
    margin-left: 10px;
    padding: 15px;
    border-radius: 10px;
    border: none;
    background: #10a37f;
    color: white;
}

/* CARDS */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
    gap: 15px;
    margin-top: 10px;
}

.card {
    background: white;
    border-radius: 10px;
    overflow: hidden;
}

.dark .card {
    background: #444654;
}

.card img {
    width: 100%;
    height: 140px;
    object-fit: cover;
}

.card-content {
    padding: 10px;
}

.price {
    color: green;
    font-weight: bold;
}

.old {
    text-decoration: line-through;
    color: gray;
}
</style>
</head>

<body>

<div class="header">
Mera AI 🍔
<button onclick="toggleDark()">🌙</button>
</div>

<div class="chat-container" id="chat"></div>

<div class="input-box">
<input id="query" placeholder="Ask for food... (biryani, pizza, waffle)">
<button onclick="search()">Send</button>
</div>

<script>

function toggleDark() {
    document.body.classList.toggle("dark");
}

/* IMAGE FIX */
function getImage(q) {
    return "https://source.unsplash.com/400x300/?"+q+",food";
}

/* SEARCH */
async function search() {
    let query = document.getElementById("query").value;
    if(!query) return;

    let chat = document.getElementById("chat");

    // USER MESSAGE
    chat.innerHTML += `
    <div class="message user-msg">
        ${query}
    </div>
    `;

    document.getElementById("query").value = "";

    let res = await fetch("https://mera-ai.onrender.com/search?query=" + query);
    let data = await res.json();

    let cards = "";

    data.results.forEach((r, i) => {

        let img = getImage(query);

        cards += `
        <div class="card">
            <img src="${img}" onerror="this.src='https://via.placeholder.com/400x300?text=Food'">
            <div class="card-content">
                <h4>${r.restaurant}</h4>
                <p>
                    <span class="price">₹${r.final_price}</span>
                    <span class="old">₹${r.original_price}</span>
                </p>
                <p>${r.discount}% OFF | ${r.delivery_time} mins</p>
                <p>${r.platform}</p>
                ${i===0 ? "<b>⭐ Best Choice</b>" : ""}
            </div>
        </div>
        `;
    });

    // AI RESPONSE
    chat.innerHTML += `
    <div class="message ai-msg">
        <div>Here are the best options for "${query}" 👇</div>
        <div class="cards">${cards}</div>
    </div>
    `;

    window.scrollTo(0, document.body.scrollHeight);
}

/* ENTER KEY */
document.addEventListener("keypress", function(e){
    if(e.key === "Enter") search();
});
</script>

</body>
</html>
