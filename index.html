<!DOCTYPE html>
<html>
<head>
<title>Mera AI</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
}

.dark {
    background: #121212;
    color: white;
}

.header {
    display: flex;
    justify-content: space-between;
    padding: 15px 25px;
    background: white;
}

.dark .header {
    background: #1e1e1e;
}

.container {
    display: flex;
}

.sidebar {
    width: 220px;
    background: #202123;
    color: white;
    padding: 20px;
    height: 100vh;
}

.main {
    flex: 1;
    padding: 20px;
}

.search-box input, .filters input {
    padding: 10px;
    margin-right: 10px;
}

button {
    padding: 10px;
    background: #ff5a5f;
    color: white;
    border: none;
}

.results {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
}

.card {
    background: white;
    border-radius: 10px;
    overflow: hidden;
}

.dark .card {
    background: #1e1e1e;
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

.card-content {
    padding: 10px;
}

.price {
    color: green;
    font-weight: bold;
}

.old-price {
    text-decoration: line-through;
    color: gray;
}

.badge {
    background: green;
    color: white;
    padding: 4px;
    border-radius: 4px;
}
</style>
</head>

<body>

<div class="header">
    <div>Mera AI 🍔</div>
    <div id="userName"></div>
</div>

<div class="container">

<div class="sidebar">
    <button onclick="toggleDark()">🌙 Dark Mode</button>
</div>

<div class="main">

<div class="search-box">
    <input id="query" placeholder="Search food">
    <button onclick="search()">Search</button>
</div>

<!-- 🔥 FILTERS -->
<div class="filters">
    <input id="maxPrice" placeholder="Max Price">
    <input id="maxTime" placeholder="Max Time">
</div>

<div id="results" class="results"></div>

</div>
</div>

<script>

/* DARK MODE */
function toggleDark() {
    document.body.classList.toggle("dark");
}

/* SEARCH */
async function search() {
    let query = document.getElementById("query").value;

    let res = await fetch("https://mera-ai.onrender.com/search?query=" + query);
    let data = await res.json();

    let maxPrice = document.getElementById("maxPrice").value;
    let maxTime = document.getElementById("maxTime").value;

    let filtered = data.results.filter(r => {
        return (!maxPrice || r.final_price <= maxPrice) &&
               (!maxTime || r.delivery_time <= maxTime);
    });

    let html = "";

    filtered.forEach((r, index) => {

        let img = "https://loremflickr.com/400/300/" + query;

        html += `
        <div class="card">
            <img src="${img}" onerror="this.src='https://via.placeholder.com/400x300?text=Food'">
            <div class="card-content">
                <h3>${r.restaurant}</h3>

                <p>
                    <span class="price">₹${r.final_price}</span>
                    <span class="old-price">₹${r.original_price}</span>
                </p>

                <div class="badge">${r.discount}% OFF</div>
                <p>${r.delivery_time} mins</p>
                <p>${r.platform}</p>

                ${index === 0 ? '<div class="badge" style="background:orange;">Best Deal ⭐</div>' : ''}
            </div>
        </div>
        `;
    });

    document.getElementById("results").innerHTML = html;
}

/* ENTER KEY */
document.addEventListener("keypress", function(e) {
    if (e.key === "Enter") search();
});
</script>

</body>
</html>
