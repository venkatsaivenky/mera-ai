<!DOCTYPE html>
<html>
<head>
<title>Mera AI</title>

<style>
body {margin:0; font-family:Arial; background:#111; color:white;}
.header {padding:15px; background:#1e1e1e; display:flex; justify-content:space-between;}
.main {display:flex;}
.sidebar {width:250px; background:#000; padding:15px;}
.content {flex:1; padding:20px;}

input, button {
  padding:10px;
  border-radius:6px;
  border:none;
}

button {background:#ff5a5f; color:white; cursor:pointer;}

.card {background:#1e1e1e; padding:10px; margin:10px; border-radius:10px;}
.card img {width:100%; height:150px; object-fit:cover;}
</style>
</head>

<body>

<div class="header">
  <h2>Mera AI 🍔</h2>
  <div id="user"></div>
</div>

<div class="main">

<div class="sidebar">
  <button onclick="newChat()">+ New Chat</button>
  <button onclick="loadHistory()">History</button>
  <div id="history"></div>
</div>

<div class="content">

<div id="loginBox">
  <input id="u" placeholder="username">
  <input id="p" type="password" placeholder="password">
  <button onclick="login()">Login</button>
  <button onclick="signup()">Signup</button>
</div>

<div id="app" style="display:none;">
  <input id="query" placeholder="Search..." onkeydown="if(event.key==='Enter')search()">
  <button onclick="search()">Search</button>

  <div id="chat"></div>
</div>

</div>
</div>

<script>

let user="";

async function signup(){
  let u=document.getElementById("u").value;
  let p=document.getElementById("p").value;

  await fetch("https://mera-ai.onrender.com/signup?username="+u+"&password="+p,{method:"POST"});
  alert("Signup done");
}

async function login(){
  let u=document.getElementById("u").value;
  let p=document.getElementById("p").value;

  let res = await fetch("https://mera-ai.onrender.com/login?username="+u+"&password="+p,{method:"POST"});

  if(res.ok){
    user=u;
    document.getElementById("loginBox").style.display="none";
    document.getElementById("app").style.display="block";
    document.getElementById("user").innerHTML="👤 "+u;
    loadHistory();
  }else{
    alert("Login failed");
  }
}

async function search(){

 let q=document.getElementById("query").value;

 let res=await fetch(`https://mera-ai.onrender.com/search?query=${q}&user=${user}`);
 let data=await res.json();

 let html=`<div>${data.ai_message}</div>`;

 data.results.forEach(r=>{
   html+=`
   <div class="card">
     <img src="${r.image}">
     <h3>${r.restaurant}</h3>
     ₹${r.final_price}
   </div>`;
 });

 document.getElementById("chat").innerHTML=html;

 loadHistory();
}

async function loadHistory(){
 let res=await fetch(`https://mera-ai.onrender.com/history?user=${user}`);
 let data=await res.json();

 document.getElementById("history").innerHTML=
  data.map(x=>`<div onclick="repeat('${x}')">${x}</div>`).join("");
}

function repeat(q){
 document.getElementById("query").value=q;
 search();
}

function newChat(){
 document.getElementById("chat").innerHTML="";
}

</script>

</body>
</html>
